phase: narration

inputs:
  - plan_json: project_dir/plan.json
  - title: plan.title
  - constraints: one_script_entry_per_scene_narration_key, qwen_tts_safe_text
  - note: narration text is fed to cached Qwen TTS — use plain spoken prose only, no special markup

output:
  format: json_only
  file: narration_script.py
  required_fields:
    - scene_narration_key => narration_text

validation:
  response_is_json_object: true
  all_values_are_strings: true
  all_scene_narration_keys_present: true
